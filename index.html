<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北冰洋水產訂單查詢系統</title>
    <style>
        :root { --primary-color: #0077b6; --arrived-green: #2d8a4e; --pending-gray: #6c757d; --gold-color: #ffd43b; --paid-color: #94a3b8; }
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 15px; max-width: 800px; margin: auto; background-color: #f0f4f8; color: #333; }
        h2 { color: var(--primary-color); text-align: center; margin-bottom: 25px; letter-spacing: 2px; }
        .filter-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .group-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .group-btn { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; background: white; font-weight: bold; }
        .group-btn.active { border-color: var(--primary-color); background: var(--primary-color); color: white; }
        .search-box { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; outline: none; font-size: 16px; }
        button#searchBtn { padding: 12px 25px; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .candidate-area { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; padding: 10px; background: #eef6fb; border-radius: 10px; display: none; }
        .candidate-btn { padding: 8px 15px; background: white; border: 1px solid var(--primary-color); color: var(--primary-color); border-radius: 20px; cursor: pointer; font-weight: bold; }
        .result-id-display { font-size: 1.6em; font-weight: 900; color: var(--primary-color); margin: 15px 0; padding: 12px; background: #fff; border-radius: 8px; border-left: 10px solid var(--primary-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .section-title { margin: 25px 0 12px 0; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.1em; }
        .title-arrived { background-color: #e6f4ea; color: var(--arrived-green); border-left: 6px solid var(--arrived-green); }
        .title-not-arrived { background-color: #f1f3f4; color: var(--pending-gray); border-left: 6px solid var(--pending-gray); }
        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 8px solid transparent; }
        .arrived-card { border-left-color: var(--arrived-green); }
        .not-arrived-card { border-left-color: var(--pending-gray); }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 0.95em; font-weight: 900; margin-bottom: 10px; }
        .tag-green { background: #2d8a4e; color: white; }
        .tag-gray { background: #6c757d; color: white; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.15em; }
        .price-text { color: #d93025; font-size: 1.1em; }
        .paid-text { color: var(--paid-color); font-weight: bold; }
        .item-info { color: #666; font-size: 1em; margin-top: 6px; }
        .note-text { margin-top: 10px; color: #0077b6; font-size: 0.9em; border-top: 1px dashed #eee; padding-top: 8px; font-style: italic; }
        .summary-box { background: #1a1c1e; color: white; padding: 25px; border-radius: 18px; margin-top: 35px; }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; }
        .highlight-gold { color: var(--gold-color); font-size: 1.5em; font-weight: bold; } 
        .normal-white { color: #ffffff; font-size: 1.5em; font-weight: bold; }
        .warning-footer { text-align: center; margin-top: 30px; padding: 15px; background-color: #fff3e0; color: #e67e22; border-radius: 10px; font-size: 0.95em; font-weight: bold; border: 1px solid #ffe0b2; }
    </style>
</head>
<body>

<h2>🚢 北冰洋水產訂單查詢</h2>

<div class="filter-section">
    <div class="group-selector">
        <button class="group-btn active" onclick="setGroup('一群', this)">一群</button>
        <button class="group-btn" onclick="setGroup('二群', this)">二群</button>
    </div>
    <div class="search-box">
        <input type="text" id="idInput" placeholder="輸入名字的一個字篩選 (如: 小)">
        <button id="searchBtn" onclick="handleSearchClick()">搜尋</button>
    </div>
    <div id="candidateArea" class="candidate-area"></div>
</div>

<div id="resultArea"></div>

<div class="warning-footer">
    ⚠️ 系統偶有出錯的可能，若有問題請直接詢問版面小編
</div>

<script>
    const sheetId = '1ei5nO5UIA5rAbc1ZOCTnoMN45AATJ1AM1PyyYWA1yQk'; 
    const gid = '1759685312'; 
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

    let currentGroup = '一群';
    let allData = [];

    // 定義已結清且不計費狀態（排除已釋出）
    const PAID_STATUS = ["已結未取", "已結寄黑貓", "已結寄 7-11", "已結未到"];

    function parseAmount(val) {
        if (!val) return 0;
        let cleaned = val.toString().replace(/[$,]/g, '');
        return parseFloat(cleaned) || 0;
    }

    function setGroup(group, btn) {
        currentGroup = group;
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('candidateArea').style.display = 'none';
        document.getElementById('resultArea').innerHTML = '';
    }

    async function fetchData() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            allData = text.split(/\r?\n/).map(line => {
                const parts = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    if (line[i] === '"') inQuotes = !inQuotes;
                    else if (line[i] === ',' && !inQuotes) { parts.push(current.trim()); current = ''; }
                    else current += line[i];
                }
                parts.push(current.trim());
                return parts;
            });
        } catch (e) { alert("資料讀取失敗"); }
    }

    async function handleSearchClick() {
        const query = document.getElementById('idInput').value.trim().toLowerCase();
        if (!query) return alert('請輸入關鍵字！');
        if (allData.length === 0) await fetchData();

        const matchedIds = [...new Set(allData
            .filter((row, idx) => {
                if (idx === 0) return false;
                const status = row[1] || "";
                // 排除已取貨與已釋出
                return row[2] === currentGroup && 
                       (row[3]||"").toLowerCase().includes(query) && 
                       status !== "已取貨" && 
                       status !== "已釋出";
            })
            .map(row => row[3])
        )];

        const candidateArea = document.getElementById('candidateArea');
        if (matchedIds.length === 0) {
            candidateArea.style.display = 'none';
            document.getElementById('resultArea').innerHTML = '<div style="text-align:center; padding:30px; color:#999; background:white; border-radius:12px;">🔍 找不到相符的客戶。</div>';
        } else if (matchedIds.length === 1) {
            candidateArea.style.display = 'none';
            showFinalResults(matchedIds[0]);
        } else {
            candidateArea.style.display = 'flex';
            candidateArea.innerHTML = matchedIds.map(id => `<button class="candidate-btn" onclick="showFinalResults('${id.replace(/'/g, "\\'")}')">${id}</button>`).join('');
            document.getElementById('resultArea').innerHTML = '<div style="text-align:center; padding:10px; color:#666;">請點選下方正確的 ID：</div>';
        }
    }

    function showFinalResults(targetId) {
        document.getElementById('candidateArea').style.display = 'none';
        // 篩選時再次確保排除已釋出
        const items = allData.filter(row => row[2] === currentGroup && row[3] === targetId && row[1] !== "已取貨" && row[1] !== "已釋出");
        
        const arrivedList = items.filter(r => ["未取貨", "已取未付", "已結未取", "已結寄黑貓", "已結寄 7-11"].includes(r[1]));
        const notArrivedList = items.filter(r => ["未到貨", "已結未到"].includes(r[1]));

        let html = `<div class="result-id-display">📍 查詢 ID：${targetId}</div>`;

        html += `<div class="section-title title-arrived">✅ 已到貨商品 (待處理)</div>`;
        html += arrivedList.length === 0 ? `<div style="text-align:center; padding:20px; color:#999; background:white; border-radius:12px; border:2px dashed #dee2e6;">目前沒有已到貨商品</div>` : arrivedList.map(r => createCard(r, 'arrived')).join('');

        html += `<div class="section-title title-not-arrived">⏳ 未到貨商品 (預購中)</div>`;
        html += notArrivedList.length === 0 ? `<div style="text-align:center; padding:20px; color:#999; background:white; border-radius:12px; border:2px dashed #dee2e6;">目前沒有未到貨商品</div>` : notArrivedList.map(r => createCard(r, 'not-arrived')).join('');

        const calc = (list) => {
            const billable = list.filter(r => !PAID_STATUS.includes(r[1]));
            return {
                items: list.length,
                qty: list.reduce((s, r) => s + (parseInt(r[6]) || 0), 0),
                total: billable.reduce((s, r) => s + parseAmount(r[7]), 0)
            };
        };

        const aStats = calc(arrivedList);
        const nStats = calc(notArrivedList);

        html += `
            <div class="summary-box">
                <div class="summary-row">
                    <div class="sum-label">已到貨合計<br><small>${aStats.items} 品項 / ${aStats.qty} 件商品</small></div>
                    <div class="sum-val highlight-gold">$${aStats.total.toLocaleString()}</div>
                </div>
                <div class="summary-row">
                    <div class="sum-label">未到貨合計<br><small>${nStats.items} 品項 / ${nStats.qty} 件商品</small></div>
                    <div class="sum-val">$${nStats.total.toLocaleString()}</div>
                </div>
                <div class="summary-row" style="border:none; margin-top:10px; padding-top:20px;">
                    <div class="sum-label" style="color:white; font-size:1.1em; font-weight:bold;">總金額</div>
                    <div class="sum-val normal-white">$${(aStats.total + nStats.total).toLocaleString()}</div>
                </div>
            </div>`;

        document.getElementById('resultArea').innerHTML = html;
    }

    function createCard(row, type) {
        const status = row[1];
        const isPaid = PAID_STATUS.includes(status);
        return `
            <div class="card ${type === 'arrived' ? 'arrived-card' : 'not-arrived-card'}">
                <div class="status-tag ${type === 'arrived' ? 'tag-green' : 'tag-gray'}">${status}</div>
                <div class="item-header">
                    <span>${row[4] || "未知商品"}</span>
                    <span class="${isPaid ? 'paid-text' : 'price-text'}">${isPaid ? '已結清' : '$' + parseAmount(row[7]).toLocaleString()}</span>
                </div>
                <div class="item-info">單價: $${row[5]} | 數量: ${row[6]}</div>
                ${row[8] ? `<div class="note-text">📝 備註: ${row[8]}</div>` : ''}
            </div>`;
    }
</script>
</body>
</html>
