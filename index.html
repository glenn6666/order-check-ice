<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北冰洋水產訂單查詢系統</title>
    <style>
        :root { --primary-color: #0077b6; --arrived-green: #2d8a4e; --pending-gray: #6c757d; --gold-color: #ffd43b; }
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 15px; max-width: 800px; margin: auto; background-color: #f0f4f8; color: #333; }
        
        h2 { color: var(--primary-color); text-align: center; margin-bottom: 25px; letter-spacing: 2px; }
        .filter-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .group-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .group-btn { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; background: white; font-weight: bold; transition: 0.3s; }
        .group-btn.active { border-color: var(--primary-color); background: var(--primary-color); color: white; }
        
        .search-box { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 10px; outline: none; font-size: 16px; }
        button#searchBtn { padding: 12px 25px; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* 模糊搜尋候選按鈕區 */
        .candidate-area { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; padding: 10px; background: #eef6fb; border-radius: 10px; display: none; }
        .candidate-btn { padding: 8px 15px; background: white; border: 1px solid var(--primary-color); color: var(--primary-color); border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .candidate-btn:hover { background: var(--primary-color); color: white; }

        /* 搜尋結果 ID 強調 */
        .result-id-display { font-size: 1.5em; font-weight: 900; color: var(--primary-color); margin: 15px 0; padding: 10px; background: #fff; border-radius: 8px; border-left: 8px solid var(--primary-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .section-title { margin: 25px 0 12px 0; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.05em; }
        .title-arrived { background-color: #e6f4ea; color: var(--arrived-green); border-left: 6px solid var(--arrived-green); }
        .title-not-arrived { background-color: #f1f3f4; color: var(--pending-gray); border-left: 6px solid var(--pending-gray); }

        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid transparent; }
        .arrived-card { border-left-color: var(--arrived-green); }
        .not-arrived-card { border-left-color: var(--pending-gray); }

        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1em; }
        .price-text { color: #d93025; }
        .item-info { color: #666; font-size: 0.95em; margin-top: 6px; }
        .note-text { margin-top: 10px; color: #0077b6; font-size: 0.9em; border-top: 1px dashed #eee; padding-top: 8px; font-style: italic; }

        .summary-box { background: #1a1c1e; color: white; padding: 25px; border-radius: 18px; margin-top: 35px; }
        .summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; }
        .highlight-gold { color: var(--gold-color); font-size: 1.4em; font-weight: bold; } 
        .normal-white { color: #ffffff; font-size: 1.4em; font-weight: bold; }
        .sum-footer { text-align: center; font-size: 0.8em; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<h2>🚢 北冰洋水產訂單查詢</h2>

<div class="filter-section">
    <div class="group-selector">
        <button class="group-btn active" onclick="setGroup('一群', this)">一群</button>
        <button class="group-btn" onclick="setGroup('二群', this)">二群</button>
    </div>
    <div class="search-box">
        <input type="text" id="idInput" placeholder="輸入名字的一個字篩選 (如: 小)">
        <button id="searchBtn" onclick="handleSearchClick()">搜尋</button>
    </div>
    <div id="candidateArea" class="candidate-area"></div>
</div>

<div id="resultArea"></div>

<script>
    const sheetId = '1ei5nO5UIA5rAbc1ZOCTnoMN45AATJ1AM1PyyYWA1yQk'; 
    const gid = '1759685312'; 
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

    let currentGroup = '一群';
    let allData = [];

    function setGroup(group, btn) {
        currentGroup = group;
        document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('candidateArea').style.display = 'none';
        document.getElementById('resultArea').innerHTML = '';
    }

    function parseCSV(text) {
        const rows = [];
        let curRow = [];
        let curCell = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (inQuotes) {
                if (c === '"' && text[i+1] === '"') { curCell += '"'; i++; }
                else if (c === '"') inQuotes = false;
                else curCell += c;
            } else {
                if (c === '"') inQuotes = true;
                else if (c === ',') { curRow.push(curCell.trim()); curCell = ''; }
                else if (c === '\r' || c === '\n') {
                    curRow.push(curCell.trim());
                    if (curRow.length > 1) rows.push(curRow);
                    curRow = []; curCell = '';
                    if (c === '\r' && text[i+1] === '\n') i++;
                } else curCell += c;
            }
        }
        if (curRow.length > 0 || curCell !== '') { curRow.push(curCell.trim()); rows.push(curRow); }
        return rows;
    }

    async function fetchData() {
        const res = await fetch(csvUrl);
        const text = await res.text();
        allData = parseCSV(text);
    }

    async function handleSearchClick() {
        const query = document.getElementById('idInput').value.trim().toLowerCase();
        if (!query) return alert('請輸入關鍵字！');

        if (allData.length === 0) {
            document.getElementById('resultArea').innerHTML = '⏳ 正在讀取資料...';
            await fetchData();
        }

        // 找出所有符合關鍵字的唯一 ID
        const matchedIds = [...new Set(allData
            .filter((row, idx) => idx > 0 && row[2] === currentGroup && row[3].toLowerCase().includes(query) && row[1] !== "已取貨")
            .map(row => row[3])
        )];

        const candidateArea = document.getElementById('candidateArea');
        if (matchedIds.length === 0) {
            candidateArea.style.display = 'none';
            document.getElementById('resultArea').innerHTML = '<div style="text-align:center; padding:20px;">🔍 找不到相符的客戶。</div>';
        } else if (matchedIds.length === 1) {
            candidateArea.style.display = 'none';
            showFinalResults(matchedIds[0]);
        } else {
            // 顯示多個候選人供點選
            candidateArea.style.display = 'flex';
            candidateArea.innerHTML = matchedIds.map(id => 
                `<button class="candidate-btn" onclick="showFinalResults('${id.replace(/'/g, "\\'")}')">${id}</button>`
            ).join('');
            document.getElementById('resultArea').innerHTML = '<div style="text-align:center; padding:10px; color:#666;">請點選下方正確的 ID：</div>';
        }
    }

    function showFinalResults(targetId) {
        document.getElementById('candidateArea').style.display = 'none';
        const items = allData.filter(row => row[2] === currentGroup && row[3] === targetId && row[1] !== "已取貨");
        
        const arrivedList = items.filter(r => ["未取貨", "已取未付", "已結未取"].includes(r[1]));
        const notArrivedList = items.filter(r => r[1] === "未到貨");

        let html = `<div class="result-id-display">📍 查詢 ID：${targetId}</div>`;

        // 已到貨區塊
        html += `<div class="section-title title-arrived">📦 已到貨商品</div>`;
        html += arrivedList.length === 0 ? `<div class="empty-msg">目前沒有已到貨商品</div>` : arrivedList.map(r => createCard(r, 'arrived')).join('');

        // 未到貨區塊
        html += `<div class="section-title title-not-arrived">🗓️ 未到貨商品</div>`;
        html += notArrivedList.length === 0 ? `<div class="empty-msg">目前沒有未到貨商品</div>` : notArrivedList.map(r => createCard(r, 'not-arrived')).join('');

        // 總計
        const stats = {
            aItems: arrivedList.length,
            aQty: arrivedList.reduce((s, r) => s + (parseInt(r[6]) || 0), 0),
            aTotal: arrivedList.reduce((s, r) => s + (parseInt(r[7].replace(/[^0-9]/g, '')) || 0), 0),
            nItems: notArrivedList.length,
            nQty: notArrivedList.reduce((s, r) => s + (parseInt(r[6]) || 0), 0),
            nTotal: notArrivedList.reduce((s, r) => s + (parseInt(r[7].replace(/[^0-9]/g, '')) || 0), 0)
        };

        html += `
            <div class="summary-box">
                <div class="summary-row">
                    <div class="sum-label">已到貨合計<br><small>${stats.aItems} 品項 / ${stats.aQty} 件商品</small></div>
                    <div class="sum-val highlight-gold">$${stats.aTotal.toLocaleString()}</div>
                </div>
                <div class="summary-row">
                    <div class="sum-label">未到貨合計<br><small>${stats.nItems} 品項 / ${stats.nQty} 件商品</small></div>
                    <div class="sum-val">$${stats.nTotal.toLocaleString()}</div>
                </div>
                <div class="summary-row" style="border:none; margin-top:10px; padding-top:20px;">
                    <div class="sum-label" style="color:white; font-size:1.1em; font-weight:bold;">總金額</div>
                    <div class="sum-val normal-white">$${(stats.aTotal + stats.nTotal).toLocaleString()}</div>
                </div>
            </div>`;

        document.getElementById('resultArea').innerHTML = html;
    }

    function createCard(row, type) {
        const subtotal = (row[7] || "0").replace(/[^0-9]/g, '');
        return `
            <div class="card ${type === 'arrived' ? 'arrived-card' : 'not-arrived-card'}">
                <div class="item-header">
                    <span>${row[4]}</span>
                    <span class="price-text">$${parseInt(subtotal).toLocaleString()}</span>
                </div>
                <div class="item-info">狀態: ${row[1]} | 單價: $${row[5]} | 數量: ${row[6]}</div>
                ${row[8] ? `<div class="note-text">📝 備註: ${row[8]}</div>` : ''}
            </div>`;
    }
</script>
</body>
</html>
