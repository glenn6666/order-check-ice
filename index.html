<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北冰洋水產訂單查詢</title>
    <style>
        body { font-family: "Microsoft JhengHei", -apple-system, sans-serif; padding: 15px; max-width: 800px; margin: auto; background-color: #f0f2f5; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 15px; border: 2px solid #1a73e8; border-radius: 8px; font-size: 16px; }
        button { padding: 15px 20px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .warning-text { 
            color: #e67e22; font-size: 0.85em; text-align: center; margin-bottom: 20px; padding: 8px;
            background-color: #fff3e0; border-radius: 5px; font-weight: bold;
        }

        .section-title { margin: 20px 0 10px 0; padding: 8px 12px; border-radius: 5px; font-weight: bold; display: flex; align-items: center; }
        .title-arrived { background-color: #e6f4ea; color: #1e8e3e; border-left: 5px solid #1e8e3e; }
        .title-not-arrived { background-color: #f1f3f4; color: #5f6368; border-left: 5px solid #5f6368; }

        .name-selector { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #e8f0fe; border-radius: 10px; border: 1px dashed #1a73e8; }
        .name-btn { padding: 10px 15px; background: white; border: 1px solid #1a73e8; border-radius: 20px; color: #1a73e8; cursor: pointer; font-weight: bold; }
        
        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .arrived-card { border-left: 5px solid #34a853; }
        .not-arrived-card { border-left: 5px solid #adb5bd; background-color: #fafafa; color: #6c757d; }
        
        .item-name { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; }
        .item-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .item-details { color: #666; font-size: 0.9em; line-height: 1.5; }
        .item-price { font-weight: bold; color: #d93025; font-size: 1.1em; }

        .empty-msg { text-align: center; padding: 20px; color: #999; font-size: 0.9em; background: #fff; border-radius: 10px; border: 1px dashed #ddd; }
        
        .total-container { margin-top: 30px; background: #202124; color: white; border-radius: 10px; padding: 20px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #3c4043; }
        .total-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .total-label { font-size: 0.9em; color: #aaa; }
        .total-value { font-weight: bold; text-align: right; }
        .total-price { color: #ffab00; font-size: 1.2em; }
        .no-data { text-align: center; padding: 50px 20px; color: #70757a; }
        .instruction { font-size: 0.9em; color: #5f6368; margin-bottom: 10px; }
    </style>
</head>
<body>

<h2>📦 北冰洋水產訂單查詢</h2>

<div class="search-box">
    <input type="text" id="nameInput" placeholder="輸入名字關鍵字 (例: 阿勝)">
    <button onclick="searchNames()">搜尋</button>
</div>

<div class="warning-text">
    ⚠️ 系統偶有出錯的可能，若有問題請直接詢問版面小編
</div>

<div id="selectionArea"></div>
<div id="results"></div>

<script>
    const sheetId = '1pjTOojFm4-_rGpGGN9Nv31GCdYMPtSDQkfn8vbyBFLQ';
    const gid = '171915529';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
    
    let allRows = [];

    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const char = text[i]; const nextChar = text[i + 1];
            if (inQuotes) {
                if (char === '"' && nextChar === '"') { currentField += '"'; i++; }
                else if (char === '"') inQuotes = false;
                else currentField += char;
            } else {
                if (char === '"') inQuotes = true;
                else if (char === ',') { currentRow.push(currentField); currentField = ''; }
                else if (char === '\n' || char === '\r') {
                    currentRow.push(currentField);
                    if (currentRow.length > 1 || currentRow[0] !== '') rows.push(currentRow);
                    currentRow = []; currentField = '';
                    if (char === '\r' && nextChar === '\n') i++;
                } else currentField += char;
            }
        }
        if (currentField || currentRow.length > 0) { currentRow.push(currentField); rows.push(currentRow); }
        return rows;
    }

    async function searchNames() {
        const query = document.getElementById('nameInput').value.trim().toLowerCase();
        if (!query) return alert('請輸入名字關鍵字！');
        
        const selectionArea = document.getElementById('selectionArea');
        const resultDiv = document.getElementById('results');
        
        selectionArea.innerHTML = ''; 
        resultDiv.innerHTML = ''; 

        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            allRows = parseCSV(csvText);

            const matchedNames = new Set();
            for (let i = 1; i < allRows.length; i++) {
                const customer = (allRows[i][2] || "").trim();
                const status = (allRows[i][0] || "").trim().toUpperCase();
                if (customer.toLowerCase().includes(query) && status !== "TRUE") {
                    matchedNames.add(customer);
                }
            }

            if (matchedNames.size === 0) {
                selectionArea.innerHTML = `<div class="no-data">查無符合「${document.getElementById('nameInput').value}」的待取貨紀錄。</div>`;
            } else if (matchedNames.size === 1) {
                showDetails(Array.from(matchedNames)[0]);
            } else {
                let btnHtml = `<div class="instruction">找到多個名稱，請點選正確的名稱：</div><div class="name-selector">`;
                matchedNames.forEach(name => {
                    btnHtml += `<button class="name-btn" onclick="showDetails('${name.replace(/'/g, "\\'")}')">${name}</button>`;
                });
                btnHtml += `</div>`;
                selectionArea.innerHTML = btnHtml;
            }
        } catch (error) { 
            console.error(error);
            alert('系統忙碌中，請稍後再試。'); 
        }
    }

    function showDetails(targetName) {
        const resultDiv = document.getElementById('results');
        
        let arrivedHtml = `<div class="section-title title-arrived">✅ 已到貨商品</div>`;
        let notArrivedHtml = `<div class="section-title title-not-arrived">⏳ 未到貨商品 (待通知)</div>`;
        
        let stats = {
            arrived: { items: 0, qty: 0, total: 0 },
            notArrived: { items: 0, qty: 0, total: 0 }
        };

        let hasArrived = false;
        let hasNotArrived = false;

        for (let i = 1; i < allRows.length; i++) {
            const row = allRows[i];
            const status = (row[0] || "").trim().toUpperCase();
            const note = (row[1] || "").trim();
            const customer = (row[2] || "").trim();
            const itemName = (row[3] || "").trim();
            if (customer !== targetName || status === "TRUE" || itemName === "") continue;

            const qty = parseInt((row[4] || "").trim()) || 0;
            const price = parseInt((row[5] || "").replace(/[$,]/g, '')) || 0;
            const subtotal = parseInt((row[12] || "").replace(/[$,]/g, '')) || 0;
            const isNotArrived = note.includes("未到貨");

            const cardHtml = `
                <div class="card ${isNotArrived ? 'not-arrived-card' : 'arrived-card'}">
                    <div class="item-name">${itemName}</div>
                    <div class="item-row">
                        <div class="item-details">單價: $${price.toLocaleString()}<br>數量: ${qty}</div>
                        <div class="item-price">$${subtotal.toLocaleString()}</div>
                    </div>
                </div>`;

            if (isNotArrived) {
                notArrivedHtml += cardHtml;
                stats.notArrived.items++;
                stats.notArrived.qty += qty;
                stats.notArrived.total += subtotal;
                hasNotArrived = true;
            } else {
                arrivedHtml += cardHtml;
                stats.arrived.items++;
                stats.arrived.qty += qty;
                stats.arrived.total += subtotal;
                hasArrived = true;
            }
        }

        if (!hasArrived) arrivedHtml += `<div class="empty-msg">目前沒有已到貨商品</div>`;
        if (!hasNotArrived) notArrivedHtml += `<div class="empty-msg">目前沒有未到貨商品</div>`;

        const summaryHtml = `
            <div class="total-container">
                <div style="font-size:0.9em; margin-bottom:15px; color:#ffab00;">📊 查詢總結：${targetName}</div>
                <div class="total-row">
                    <div class="total-label">已到貨合計<br>(${stats.arrived.items}品項 / ${stats.arrived.qty}商品)</div>
                    <div class="total-value total-price">$${stats.arrived.total.toLocaleString()}</div>
                </div>
                <div class="total-row">
                    <div class="total-label">未到貨合計<br>(${stats.notArrived.items}品項 / ${stats.notArrived.qty}商品)</div>
                    <div class="total-value">$${stats.notArrived.total.toLocaleString()}</div>
                </div>
                <div class="total-row" style="border-top: 1px solid #555; padding-top:15px; margin-top:5px;">
                    <div class="total-label" style="color:#fff;">應付金額總計</div>
                    <div class="total-value" style="font-size:1.4em; color:#fff;">$${(stats.arrived.total + stats.notArrived.total).toLocaleString()}</div>
                </div>
            </div>`;

        resultDiv.innerHTML = `<div style="margin-bottom:10px; font-weight:bold; color:#1a73e8;">📍 查詢結果：</div>` + arrivedHtml + notArrivedHtml + summaryHtml;
        document.getElementById('selectionArea').innerHTML = '';
    }
</script>

</body>
</html>
